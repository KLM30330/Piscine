name: Publish

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier version == tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $TAG != Version $VERSION dans Directory.Build.props"
            exit 1
          fi

  publish-arm:
    needs: validate-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Installer cross-compile toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf zlib1g-dev
      - name: Publish AOT linux-arm
        run: |
          dotnet publish src/PiscineController/ \
            -c Release -r linux-arm --self-contained \
            /p:PublishAot=true \
            -o publish/
      - name: Créer GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/PiscineController
          generate_release_notes: true
