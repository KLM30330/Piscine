name: Publish
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'
jobs:
  publish-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Installer cross-compile toolchain arm64
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu zlib1g-dev
      - name: Injecter secrets dans appsettings.json
        run: |
          sed -i 's|"MqttBroker": ".*"|"MqttBroker": "${{ secrets.MQTT_BROKER }}"|g' src/PiscineController/appsettings.json
          sed -i 's|"MqttUser": ".*"|"MqttUser": "${{ secrets.MQTT_USER }}"|g' src/PiscineController/appsettings.json
          sed -i 's|"MqttPassword": ".*"|"MqttPassword": "${{ secrets.MQTT_PASSWORD }}"|g' src/PiscineController/appsettings.json
      - name: Publish AOT linux-arm64
        run: |
          dotnet publish src/PiscineController/ \
            -c Release -r linux-arm64 --self-contained \
            /p:PublishAot=true \
            -o publish/
      - name: Créer GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            publish/PiscineController
            publish/libSystem.IO.Ports.Native.so
            publish/appsettings.json
          generate_release_notes: true
